# Create this secret before deploying the controller:
#
#   kubectl create secret generic firebase-credentials \
#     --from-file=service-account.json=/path/to/your-firebase-service-account.json \
#     -n devops
#
# The service account JSON is downloaded from:
#   Firebase Console -> Project Settings -> Service Accounts -> Generate new private key
#
# The project_id inside the JSON is used automatically — no need to set FIREBASE_PROJECT_ID.

---
apiVersion: v1
kind: Secret
metadata:
  name: firebase-credentials
  namespace: devops
type: Opaque
data:
  # base64-encoded Firebase service account JSON
  # To encode: cat service-account.json | base64 | tr -d '\n'
  service-account.json: <BASE64_ENCODED_SERVICE_ACCOUNT_JSON>
